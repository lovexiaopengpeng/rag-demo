services:
  - type: web
    name: rag-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /
    envVars:
    - key: PYTHON_VERSION
      value: 3.9.18
    - key: PORT
      value: 8000
